
<div id="sillypoker-panel" class="hidden">
    <div class="sillypoker-header">
        <div class="header-left-icons">
            <div id="sillypoker-status-indicator" class="status-indicator" title="游戏书状态">
                <i class="fas fa-check"></i>
            </div>
        </div>
        <div class="header-title">
            <h3>SillyPoker</h3>
        </div>
        <div class="header-right-icons">
             <i id="sillypoker-settings-icon" class="fas fa-cog sillypoker-header-btn" title="设置"></i>
             <i id="sillypoker-escape-btn" class="fas fa-running sillypoker-header-btn" title="尝试逃跑"></i>
             <button class="sillypoker-close-btn sillypoker-header-btn" title="关闭">&times;</button>
        </div>
    </div>
    <div id="sillypoker-tabs-container"></div>
    <div class="sillypoker-content">
        <!-- Content is now dynamically rendered by ui.js -->
        <div class="sillypoker-content-centerer" id="sillypoker-initial-loader">
            <p>正在初始化...</p>
        </div>
    </div>
    <div id="sillypoker-commit-btn" class="sillypoker-commit-btn hidden" title="结束回合">
        <i class="fas fa-play"></i>
    </div>
</div>
